spring:
  application:
    name: chroniqo
  datasource:
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    open-in-view: false
    properties:
      hibernate:
        ddl-auto: validate
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    remember-me:
      key: ${REMEMBER_ME_KEY:}
      use-secure-cookie: ${REMEMBER_ME_SECURE_COOKIE_ENABLED:true}
      validity: P30D
      cookie-domain: ${REMEMBER_ME_COOKIE_DOMAIN:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

app:
  base-url: ${APP_BASE_URL:}
  name: chroniqo
  registration:
    enabled: ${REGISTRATION_ENABLED:false}
  version: ${APP_VERSION:}
