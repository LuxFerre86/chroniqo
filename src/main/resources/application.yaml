spring:
  application:
    name: chroniqo
    version: ${APP_VERSION}
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    #driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    #show-sql: true
    open-in-view: false
    properties:
      hibernate:
        ddl-auto: validate
        #format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    remember-me:
      key: super-long-random-string-here-min-32-chars
      use-secure-cookie: false
      validity: P30D
      cookie-domain: localhost


logging:
  level:
    org.hibernate.SQL: info
    org.hibernate.tool.schema: info