name: Production Release

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: luxferre86/chroniqo

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'chore: update changelog')"
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      # -------------------
      # Checkout
      # -------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------
      # Calculate CalVer Version
      # -------------------
      - name: Calculate Version
        run: |
          YEAR=$(date +'%Y')
          MONTH=$(date +'%m')
          PREFIX="$YEAR.$MONTH"

          git fetch --tags

          LAST_TAG=$(git tag --list "v$PREFIX.*" --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            PATCH=0
          else
            LAST_VERSION=${LAST_TAG#v}
            PATCH=${LAST_VERSION##*.}
            PATCH=$((PATCH+1))
          fi

          VERSION="$PREFIX.$PATCH"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Calculated Version: $VERSION"

      # -------------------
      # Update CHANGELOG.md
      # -------------------
      - name: Update Changelog
        run: |
          DATE=$(date +'%Y-%m-%d')
          PREV_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            RANGE=""
          else
            RANGE="$PREV_TAG..HEAD"
          fi

          COMMITS=$(git log $RANGE --pretty=format:"%s")

          ADDED=""
          FIXED=""
          OTHER=""

          while IFS= read -r line; do
            if [[ "$line" == feat* ]]; then
              ADDED="${ADDED}- ${line#feat: }\n"
            elif [[ "$line" == fix* ]]; then
              FIXED="${FIXED}- ${line#fix: }\n"
            else
              OTHER="${OTHER}- $line\n"
            fi
          done <<< "$COMMITS"

          echo "## [${VERSION}] - ${DATE}" > NEW_CHANGELOG.md
          echo "" >> NEW_CHANGELOG.md

          if [ ! -z "$ADDED" ]; then
            echo "### Added" >> NEW_CHANGELOG.md
            echo -e "$ADDED" >> NEW_CHANGELOG.md
            echo "" >> NEW_CHANGELOG.md
          fi

          if [ ! -z "$FIXED" ]; then
            echo "### Fixed" >> NEW_CHANGELOG.md
            echo -e "$FIXED" >> NEW_CHANGELOG.md
            echo "" >> NEW_CHANGELOG.md
          fi

          if [ ! -z "$OTHER" ]; then
            echo "### Maintenance" >> NEW_CHANGELOG.md
            echo -e "$OTHER" >> NEW_CHANGELOG.md
            echo "" >> NEW_CHANGELOG.md
          fi

          if [ -f CHANGELOG.md ]; then
            echo -e "# Changelog\n\n$(cat NEW_CHANGELOG.md)\n$(cat CHANGELOG.md | sed '1d')" > CHANGELOG.md
          else
            echo -e "# Changelog\n\n$(cat NEW_CHANGELOG.md)" > CHANGELOG.md
          fi

          rm NEW_CHANGELOG.md

      # -------------------
      # Commit CHANGELOG
      # -------------------
      - name: Commit Changelog
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add CHANGELOG.md
          git commit -m "chore: update changelog for ${VERSION}" || echo "No changes"
          git push

      # -------------------
      # Create Git Tag
      # -------------------
      - name: Create Git Tag
        run: |
          git tag v${VERSION}
          git push origin v${VERSION}

      # -------------------
      # Generate Release Notes
      # -------------------
      - name: Generate Release Notes
        run: |
          echo "## 🚀 Release ${VERSION}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### 🐳 Docker Image" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
          echo "${REGISTRY}/${IMAGE_NAME}:${VERSION}" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "See CHANGELOG.md for detailed changes." >> RELEASE_NOTES.md

      # -------------------
      # Create GitHub Release
      # -------------------
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${VERSION} \
            --title "Release ${VERSION}" \
            --notes-file RELEASE_NOTES.md

      # -------------------
      # Setup Java
      # -------------------
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # -------------------
      # Maven Production Build
      # -------------------
      - name: Build Application
        run: mvn -Pproduction clean package -DskipTests

      # -------------------
      # Docker Setup
      # -------------------
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # -------------------
      # Build & Push Docker Image
      # -------------------
      - name: Build and Push Docker Image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${REGISTRY}/${IMAGE_NAME}:${VERSION} \
            -t ${REGISTRY}/${IMAGE_NAME}:latest \
            --push .

      # -------------------
      # Security Scan
      # -------------------
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          format: table
          exit-code: 0
