name: PR Build

on:
  pull_request:
    branches:
      - master
      - release/**

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build + Test
        run: mvn -B clean verify

      - name: Vaadin Production Build Check
        run: mvn -B -Pproduction package -DskipTests

      - name: Build Docker Image (for scan)
        run: docker build -t chroniqo:pr-${{ github.sha }} .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: chroniqo:pr-${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true