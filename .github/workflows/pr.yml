name: PR Build

on:
  pull_request:
    branches:
      - master
      - release/**

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build + Test
        run: mvn -B clean verify

      - name: Vaadin Production Build Check
        run: mvn -Pproduction package -DskipTests
