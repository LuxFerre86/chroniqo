services:
  chroniqo:
    build:
      context: .
      dockerfile: Dockerfile
      network: none
      no_cache: true
      args:
        - APP_VERSION=${APP_VERSION}
    env_file:
      - .env
    container_name: "chroniqo"
    restart: always
    mem_limit: 768M
    mem_reservation: 256M
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s